<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placeholder Calendar — FullCalendar</title>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.20/index.global.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0b0d13;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px 28px;
  }

  /* ===== HEADER ===== */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .page-header h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .page-header h1 span { color: #6c7aff; }
  .page-subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }

  /* ===== LEGEND ===== */
  .legend { display: flex; align-items: center; gap: 14px; font-size: 11px; color: #666; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ===== TOOLBAR ===== */
  .custom-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .custom-toolbar .tb-left, .custom-toolbar .tb-right { display: flex; align-items: center; gap: 10px; }

  .view-switch { display: flex; background: #12141f; border: 1px solid #1e2132; border-radius: 10px; overflow: hidden; }
  .view-btn {
    padding: 8px 18px; font-size: 13px; font-weight: 600; color: #888;
    background: transparent; border: none; cursor: pointer; transition: all 0.15s;
  }
  .view-btn:hover { color: #ccc; }
  .view-btn.active { background: linear-gradient(135deg, #6c7aff 0%, #a855f7 100%); color: #fff; }

  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid #1e2132;
    background: #12141f; color: #888; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .nav-btn:hover { border-color: #3a3f5c; color: #fff; background: #1a1d2e; }
  .nav-label { font-size: 16px; font-weight: 700; color: #fff; min-width: 240px; text-align: center; }
  .nav-label .nav-sub { font-size: 11px; font-weight: 400; color: #666; display: block; margin-top: 1px; }
  .btn-today {
    padding: 8px 16px; border-radius: 10px; border: 1px solid #1e2132;
    background: #12141f; color: #aaa; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-today:hover { border-color: #6c7aff; color: #fff; }

  /* ===== FULLCALENDAR DARK THEME ===== */
  .fc-wrapper {
    background: #12141f;
    border: 1px solid #1e2132;
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hide FC native header */
  .fc .fc-header-toolbar { display: none !important; }

  /* Main theme overrides */
  .fc { background: #12141f; color: #e0e0e0; font-size: 12px; }
  .fc .fc-scrollgrid { border-color: #1e2132 !important; }
  .fc th { background: #161829; color: #888; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-color: #1e2132 !important; }
  .fc td { border-color: #1a1d2a !important; }
  .fc .fc-scrollgrid-section-header > td { border-bottom: 1px solid #1e2132 !important; }
  .fc colgroup col { border-color: #1a1d2a !important; }

  /* Resource label column */
  .fc .fc-datagrid-cell-frame {
    padding: 6px 12px !important;
  }
  .fc .fc-datagrid-cell-main {
    color: #bbb;
    font-size: 12px;
    font-weight: 600;
  }
  .fc .fc-datagrid-header .fc-datagrid-cell-main {
    color: #888;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-size: 11px;
  }
  .fc .fc-datagrid-cell-cushion {
    padding: 6px 10px;
  }

  /* Resource group row */
  .fc .fc-resource-group {
    background: #0f1119 !important;
  }
  .fc .fc-resource-group .fc-datagrid-cell-main {
    color: #6c7aff !important;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* Timeline slots */
  .fc .fc-timeline-slot { border-color: #1a1d2a !important; }
  .fc .fc-timeline-slot-label { color: #888; font-size: 11px; }
  .fc .fc-timeline-slot-frame { border-color: #1a1d2a !important; }
  .fc .fc-timeline-lane { background: #12141f; }
  .fc .fc-timeline-lane:hover { background: #151828; }

  /* Today highlight */
  .fc .fc-day-today,
  .fc .fc-timeline-slot.fc-day-today { background: rgba(108, 122, 255, 0.04) !important; }
  .fc .fc-day-today .fc-timeline-slot-label { color: #6c7aff; font-weight: 700; }

  /* Weekend tint */
  .fc .fc-day-sat, .fc .fc-day-sun { background: rgba(100, 116, 139, 0.02) !important; }

  /* ===== EVENT STYLES ===== */
  .fc-event {
    border: none !important;
    border-radius: 5px !important;
    font-size: 11px !important;
    font-weight: 600 !important;
    cursor: grab !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3) !important;
    transition: filter 0.12s, box-shadow 0.12s !important;
    overflow: hidden;
  }
  .fc-event:hover {
    filter: brightness(1.2);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
  }
  .fc-event .fc-event-main {
    padding: 2px 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fc-event .fc-event-title {
    font-weight: 600;
    font-size: 11px;
  }

  /* Dragging state */
  .fc-event-dragging { opacity: 0.85; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; cursor: grabbing !important; }
  .fc-event-resizing { opacity: 0.85; }

  /* Resource lane divider row styling */
  .fc .fc-resource-timeline .fc-resource {
    border-bottom: 1px solid #1a1d2a;
  }

  /* Scrollbar styling */
  .fc ::-webkit-scrollbar { width: 8px; height: 8px; }
  .fc ::-webkit-scrollbar-track { background: #0b0d13; }
  .fc ::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 4px; }
  .fc ::-webkit-scrollbar-thumb:hover { background: #3a3f5c; }

  /* Resize handle visibility */
  .fc .fc-event .fc-event-resizer {
    opacity: 0;
    transition: opacity 0.15s;
  }
  .fc .fc-event:hover .fc-event-resizer {
    opacity: 1;
  }
  .fc .fc-event .fc-event-resizer-start,
  .fc .fc-event .fc-event-resizer-end {
    width: 8px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 9000; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; animation: mFadeIn 0.2s ease; }
  @keyframes mFadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-box {
    background: #12141f; border: 1px solid #2a2d3e; border-radius: 16px;
    width: 440px; max-width: 92vw; padding: 28px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: mSlideUp 0.25s ease;
  }
  @keyframes mSlideUp { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .modal-icon { font-size: 36px; text-align: center; margin-bottom: 14px; }
  .modal-title { font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
  .modal-desc { font-size: 13px; color: #888; text-align: center; margin-bottom: 20px; line-height: 1.5; }
  .modal-detail {
    background: #0b0d13; border: 1px solid #1e2132; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 20px;
  }
  .modal-detail-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; font-size: 13px;
  }
  .modal-detail-row .md-label { color: #666; }
  .modal-detail-row .md-value { color: #e0e0e0; font-weight: 600; }
  .modal-actions { display: flex; justify-content: center; gap: 10px; }
  .mbtn {
    padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: none;
  }
  .mbtn-cancel { background: #1a1d2e; border: 1px solid #2a2d3e; color: #aaa; }
  .mbtn-cancel:hover { background: #242740; color: #fff; }
  .mbtn-danger { background: #ef4444; color: #fff; }
  .mbtn-danger:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px;
    padding: 12px 18px; display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #e0e0e0; z-index: 9500;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ===== SUMMARY ===== */
  .summary-bar { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .summary-card {
    background: #12141f; border: 1px solid #1e2132; border-radius: 12px;
    padding: 16px 22px; flex: 1; min-width: 160px; position: relative; overflow: hidden;
  }
  .summary-card .sm-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; }
  .summary-card .sm-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
  .summary-card .sm-value { font-size: 24px; font-weight: 800; color: #fff; }
  .summary-card .sm-sub { font-size: 11px; color: #555; margin-top: 2px; }

  /* ===== TOOLTIP ===== */
  .fc-popover { display: none !important; }

  .custom-tooltip {
    display: none; position: fixed;
    background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px;
    padding: 14px 18px; z-index: 9100; min-width: 260px; max-width: 320px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5); pointer-events: none;
  }
  .custom-tooltip.show { display: block; }
  .ct-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ct-color { width: 4px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .ct-name { font-size: 14px; font-weight: 700; color: #fff; }
  .ct-sub { font-size: 11px; color: #888; }
  .ct-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ct-item .ct-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .ct-item .ct-val { font-size: 13px; color: #e0e0e0; font-weight: 600; }
  .ct-status {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 8px;
  }
  .ct-hint { font-size: 10px; color: #555; margin-top: 8px; text-align: center; }

  @media (max-width: 900px) {
    body { padding: 16px; }
    .custom-toolbar { flex-direction: column; align-items: stretch; }
    .custom-toolbar .tb-left, .custom-toolbar .tb-right { justify-content: center; flex-wrap: wrap; }
    .summary-bar { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="page-header">
  <h1>Placeholder <span>Calendar</span></h1>
  <div class="legend">
    <span style="color:#888;font-weight:600;">Status:</span>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Running</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;"></div> Scheduled</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div> Pending</div>
    <div class="legend-item"><div class="legend-dot" style="background:#64748b;"></div> Ended</div>
  </div>
</div>
<div class="page-subtitle">Powered by FullCalendar — Drag blocks to move, drag edges to resize, or click to delete with confirmation.</div>

<!-- CUSTOM TOOLBAR -->
<div class="custom-toolbar">
  <div class="tb-left">
    <div class="view-switch">
      <button class="view-btn" data-view="resourceTimelineWeek" onclick="switchView('resourceTimelineWeek')">Week</button>
      <button class="view-btn active" data-view="resourceTimelineMonth" onclick="switchView('resourceTimelineMonth')">Month</button>
      <button class="view-btn" data-view="resourceTimelineYear" onclick="switchView('resourceTimelineYear')">Year</button>
    </div>
    <button class="btn-today" onclick="calendarGoToday()">Today</button>
  </div>
  <div class="tb-right">
    <button class="nav-btn" onclick="calendarPrev()">‹</button>
    <div class="nav-label" id="navLabel"></div>
    <button class="nav-btn" onclick="calendarNext()">›</button>
  </div>
</div>

<!-- FULLCALENDAR -->
<div class="fc-wrapper">
  <div id="calendar"></div>
</div>

<!-- SUMMARY -->
<div class="summary-bar" id="summaryBar"></div>

<!-- TOOLTIP -->
<div class="custom-tooltip" id="customTooltip"></div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Delete Booking</div>
    <div class="modal-desc">Are you sure you want to remove this campaign booking from the placeholder?</div>
    <div class="modal-detail" id="deleteDetail"></div>
    <div class="modal-actions">
      <button class="mbtn mbtn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="mbtn mbtn-danger" onclick="confirmDelete()">Delete Booking</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toastEl">
  <span id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
// ===================== DATA =====================
const TODAY_STR = '2026-02-25';
const TODAY = new Date(2026, 1, 25);

const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const PLACEHOLDERS = [
  'CAROUSEL_1', 'CAROUSEL_10', 'CAROUSEL_11', 'CAROUSEL_12',
  'CAROUSEL_2', 'CAROUSEL_3', 'CAROUSEL_4', 'CAROUSEL_5',
  'CAROUSEL_6', 'CAROUSEEL_7', 'CAROUSEL_8', 'CAROUSEL_9',
  'SEE_ALL_PROMO'
];

const CAMPAIGN_POOL = [
  { name: 'Blibli Ramadhan 2026',    cat: 'HTA',  color: '#6c7aff' },
  { name: 'Harbolnas 3.3 Mega Sale',  cat: 'KGA',  color: '#f97316' },
  { name: 'Super Electronics Day',    cat: 'PEL',  color: '#22c55e' },
  { name: 'Fashion Week Special',     cat: 'FWA',  color: '#ec4899' },
  { name: 'Valentine\'s Love Sale',   cat: 'KAM',  color: '#ef4444' },
  { name: 'Chinese New Year Promo',   cat: 'HOM',  color: '#eab308' },
  { name: 'Blibli Pay Day Sale',      cat: 'BLM',  color: '#3b82f6' },
  { name: 'Women\'s Day Special',     cat: 'KKE',  color: '#a855f7' },
  { name: 'Grocery Super Saver',      cat: 'KGA',  color: '#14b8a6' },
  { name: 'Gadget Flash Sale Q1',     cat: 'PEL',  color: '#06b6d4' },
  { name: 'Home Makeover Festival',   cat: 'HOM',  color: '#f43f5e' },
  { name: 'Beauty Awards 2026',       cat: 'MBS',  color: '#8b5cf6' },
  { name: 'Free Shipping Festival',   cat: 'FPR',  color: '#10b981' },
  { name: 'Member Exclusive Deals',   cat: 'BLM',  color: '#0ea5e9' },
  { name: 'Back to School 2026',      cat: 'IAN',  color: '#f59e0b' },
  { name: 'Bundle Bonanza March',     cat: 'KGA',  color: '#d946ef' },
  { name: 'Weekend Mega Deals',       cat: 'HTA',  color: '#84cc16' },
  { name: 'Baby & Kids Fair',         cat: 'IAN',  color: '#fb923c' },
  { name: 'Sports Season Kickoff',    cat: 'TIVO', color: '#38bdf8' },
  { name: 'Blibli Anniversary 15th',  cat: 'BLM',  color: '#c084fc' },
  { name: 'Travel Fair 2026',         cat: 'TRAV', color: '#2dd4bf' },
  { name: 'Automotive Fest 2026',     cat: 'OTO',  color: '#fb7185' },
  { name: 'Gaming Fest 2026',         cat: 'PEL',  color: '#818cf8' },
  { name: 'Mid-Year Clearance',       cat: 'OTHERS', color: '#64748b' },
];

// Seeded RNG
function seededRand(seed) { let s = seed; return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; }
const rng = seededRand(42);
const pick = a => a[Math.floor(rng() * a.length)];
const randInt = (lo, hi) => Math.floor(rng() * (hi - lo + 1)) + lo;

// ===================== BUILD RESOURCES =====================
const resources = [
  { id: 'main-banner', title: '🖼️  MAIN BANNER', children: PLACEHOLDERS.map((ph, i) => ({ id: ph, title: ph })) }
];

// ===================== BUILD EVENTS =====================
const events = [];
let evtId = 0;

function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function addDaysDate(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

function getStatus(sd, ed) {
  if (ed < TODAY) return 'ended';
  if (sd <= TODAY && ed >= TODAY) return 'running';
  return rng() > 0.3 ? 'scheduled' : 'pending';
}

function statusColor(st) {
  return { running:'#22c55e', scheduled:'#3b82f6', pending:'#fbbf24', ended:'#64748b' }[st] || '#555';
}

PLACEHOLDERS.forEach(ph => {
  const n = randInt(7, 14);
  let cursor = new Date(2026, 0, randInt(1, 6));
  for (let i = 0; i < n; i++) {
    const camp = pick(CAMPAIGN_POOL);
    const dur  = randInt(2, 12);
    const sd   = new Date(cursor);
    const ed   = addDaysDate(cursor, dur - 1);
    const endExcl = addDaysDate(cursor, dur); // FullCalendar uses exclusive end
    const status = getStatus(sd, ed);
    const alpha = status === 'ended' ? '88' : status === 'pending' ? 'bb' : '';

    events.push({
      id: String(evtId++),
      resourceId: ph,
      title: camp.name,
      start: toDateStr(sd),
      end: toDateStr(endExcl),
      backgroundColor: camp.color + alpha,
      borderColor: 'transparent',
      textColor: '#fff',
      extendedProps: {
        campaign: camp.name,
        category: camp.cat,
        color: camp.color,
        placeholder: ph,
        status,
        startDate: toDateStr(sd),
        endDate: toDateStr(ed),
      }
    });

    cursor.setDate(cursor.getDate() + dur + randInt(1, 8));
    if (cursor.getFullYear() > 2026) break;
  }
});

// ===================== FULLCALENDAR INIT =====================
let calendar;
let deleteTargetEvent = null;

document.addEventListener('DOMContentLoaded', function() {
  const calEl = document.getElementById('calendar');

  calendar = new FullCalendar.Calendar(calEl, {
    schedulerLicenseKey: 'CC-Attribution-NonCommercial-NoDerivatives',
    now: TODAY_STR,
    initialView: 'resourceTimelineMonth',
    initialDate: TODAY_STR,
    headerToolbar: false,
    height: 'auto',
    resourceAreaWidth: 200,
    resourceAreaHeaderContent: 'Placeholder',
    slotMinWidth: 28,

    // Resources
    resources: resources,
    resourceGroupField: 'groupId',
    resourceOrder: 'title',

    // Events
    events: events,
    editable: true,
    eventDurationEditable: true,
    eventResourceEditable: true,
    eventStartEditable: true,
    eventOverlap: true,
    snapDuration: '24:00:00',

    // Views
    views: {
      resourceTimelineWeek: {
        type: 'resourceTimeline',
        duration: { weeks: 1 },
        slotDuration: { days: 1 },
        slotLabelFormat: [
          { weekday: 'short', day: 'numeric', month: 'short' }
        ],
        slotMinWidth: 90,
      },
      resourceTimelineMonth: {
        type: 'resourceTimeline',
        duration: { months: 1 },
        slotDuration: { days: 1 },
        slotLabelFormat: [
          { day: 'numeric' }
        ],
        slotMinWidth: 28,
      },
      resourceTimelineYear: {
        type: 'resourceTimeline',
        duration: { years: 1 },
        slotDuration: { months: 1 },
        slotLabelFormat: [
          { month: 'short' }
        ],
        slotMinWidth: 60,
      },
    },

    // ===== EVENT HANDLERS =====

    // Click to delete
    eventClick: function(info) {
      info.jsEvent.preventDefault();
      openDeleteModal(info.event);
    },

    // After drag-move
    eventDrop: function(info) {
      const evt = info.event;
      const props = evt.extendedProps;
      const newStart = evt.start;
      const newEnd = evt.end ? addDaysDate(evt.end, -1) : newStart;
      evt.setExtendedProp('startDate', toDateStr(newStart));
      evt.setExtendedProp('endDate', toDateStr(newEnd));
      recalcStatus(evt);
      showToast('📅', `Moved "${props.campaign}" to ${fmtD(newStart)} — ${fmtD(newEnd)}`);
      updateSummary();
    },

    // After resize
    eventResize: function(info) {
      const evt = info.event;
      const props = evt.extendedProps;
      const newStart = evt.start;
      const newEnd = evt.end ? addDaysDate(evt.end, -1) : newStart;
      evt.setExtendedProp('startDate', toDateStr(newStart));
      evt.setExtendedProp('endDate', toDateStr(newEnd));
      const dur = daysDiff(newStart, newEnd) + 1;
      recalcStatus(evt);
      showToast('↔️', `Resized "${props.campaign}" to ${dur} day${dur > 1 ? 's' : ''} (${fmtD(newStart)} — ${fmtD(newEnd)})`);
      updateSummary();
    },

    // Hover tooltip
    eventMouseEnter: function(info) {
      const evt = info.event;
      const props = evt.extendedProps;
      const sd = evt.start;
      const ed = evt.end ? addDaysDate(evt.end, -1) : sd;
      const dur = daysDiff(sd, ed) + 1;
      const sc = statusColor(props.status);
      const sl = props.status.charAt(0).toUpperCase() + props.status.slice(1);

      const tt = document.getElementById('customTooltip');
      tt.innerHTML = `
        <div class="ct-header">
          <div class="ct-color" style="background:${props.color};"></div>
          <div>
            <div class="ct-name">${props.campaign}</div>
            <div class="ct-sub">${props.placeholder} · MAIN BANNER</div>
          </div>
        </div>
        <div class="ct-grid">
          <div class="ct-item"><div class="ct-label">Start Date</div><div class="ct-val">${fmtD(sd)}</div></div>
          <div class="ct-item"><div class="ct-label">End Date</div><div class="ct-val">${fmtD(ed)}</div></div>
          <div class="ct-item"><div class="ct-label">Duration</div><div class="ct-val">${dur} day${dur>1?'s':''}</div></div>
          <div class="ct-item"><div class="ct-label">Category</div><div class="ct-val">${props.category}</div></div>
        </div>
        <div class="ct-status" style="background:${sc}18;color:${sc};border:1px solid ${sc}30;">● ${sl}</div>
        <div class="ct-hint">Drag to move · Drag edges to resize · Click to delete</div>`;
      tt.classList.add('show');

      const rect = info.el.getBoundingClientRect();
      let x = rect.left, y = rect.bottom + 8;
      if (x + 300 > window.innerWidth) x = window.innerWidth - 320;
      if (y + 220 > window.innerHeight) y = rect.top - 220;
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    },

    eventMouseLeave: function() {
      document.getElementById('customTooltip').classList.remove('show');
    },

    // Update title on view change
    datesSet: function(info) {
      updateNavLabel();
      updateSummary();
    },
  });

  calendar.render();
  updateNavLabel();
  updateSummary();
});

// ===================== HELPERS =====================
function fmtD(d) { return `${d.getDate()} ${MONTHS_S[d.getMonth()]} ${d.getFullYear()}`; }
function daysDiff(a, b) { return Math.round((b - a) / 86400000); }

function recalcStatus(evt) {
  const sd = evt.start;
  const ed = evt.end ? addDaysDate(evt.end, -1) : sd;
  let st;
  if (ed < TODAY) st = 'ended';
  else if (sd <= TODAY && ed >= TODAY) st = 'running';
  else st = 'scheduled';
  evt.setExtendedProp('status', st);

  // Update visual color
  const alpha = st === 'ended' ? '88' : st === 'pending' ? 'bb' : '';
  evt.setProp('backgroundColor', evt.extendedProps.color + alpha);
}

// ===================== NAVIGATION =====================
function switchView(viewName) {
  calendar.changeView(viewName);
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === viewName));
}

function calendarGoToday() {
  calendar.today();
}

function calendarPrev() {
  calendar.prev();
}

function calendarNext() {
  calendar.next();
}

function updateNavLabel() {
  if (!calendar) return;
  const el = document.getElementById('navLabel');
  const view = calendar.view;
  const start = view.activeStart;
  const end = addDaysDate(view.activeEnd, -1);

  if (view.type === 'resourceTimelineWeek') {
    el.innerHTML = `${fmtD(start)} — ${fmtD(end)}<span class="nav-sub">Week View · 7 days</span>`;
  } else if (view.type === 'resourceTimelineMonth') {
    el.innerHTML = `${MONTHS[start.getMonth()]} ${start.getFullYear()}<span class="nav-sub">Month View</span>`;
  } else {
    el.innerHTML = `${start.getFullYear()}<span class="nav-sub">Year View · 12 months</span>`;
  }
}

// ===================== DELETE =====================
function openDeleteModal(evt) {
  deleteTargetEvent = evt;
  const props = evt.extendedProps;
  const sd = evt.start;
  const ed = evt.end ? addDaysDate(evt.end, -1) : sd;
  const dur = daysDiff(sd, ed) + 1;
  const sc = statusColor(props.status);

  document.getElementById('deleteDetail').innerHTML = `
    <div class="modal-detail-row"><span class="md-label">Campaign</span><span class="md-value">${props.campaign}</span></div>
    <div class="modal-detail-row"><span class="md-label">Placeholder</span><span class="md-value">${props.placeholder}</span></div>
    <div class="modal-detail-row"><span class="md-label">Period</span><span class="md-value">${fmtD(sd)} — ${fmtD(ed)}</span></div>
    <div class="modal-detail-row"><span class="md-label">Duration</span><span class="md-value">${dur} day${dur>1?'s':''}</span></div>
    <div class="modal-detail-row"><span class="md-label">Category</span><span class="md-value">${props.category}</span></div>
    <div class="modal-detail-row"><span class="md-label">Status</span><span class="md-value" style="color:${sc};">${props.status.charAt(0).toUpperCase() + props.status.slice(1)}</span></div>`;
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTargetEvent = null;
}

function confirmDelete() {
  if (!deleteTargetEvent) return;
  const name = deleteTargetEvent.extendedProps.campaign;
  const ph = deleteTargetEvent.extendedProps.placeholder;
  deleteTargetEvent.remove();
  closeDeleteModal();
  showToast('🗑️', `Deleted "${name}" from ${ph}`);
  updateSummary();
}

// ===================== TOAST =====================
let toastTimer;
function showToast(icon, msg) {
  const el = document.getElementById('toastEl');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ===================== SUMMARY =====================
function updateSummary() {
  if (!calendar) return;
  const view = calendar.view;
  const rStart = view.activeStart;
  const rEnd = view.activeEnd;

  const allEvents = calendar.getEvents();
  const vis = allEvents.filter(e => e.start < rEnd && (e.end || e.start) > rStart);

  const totalSlots = PLACEHOLDERS.length;
  const activeCamps = [...new Set(vis.map(e => e.extendedProps.campaign))].length;
  const runningNow  = vis.filter(e => e.extendedProps.status === 'running').length;
  const scheduledCnt = vis.filter(e => e.extendedProps.status === 'scheduled').length;

  const rangeDays = daysDiff(rStart, rEnd);
  const totalSlotDays = totalSlots * rangeDays;
  let occupiedDays = 0;
  PLACEHOLDERS.forEach(ph => {
    const phEvts = vis.filter(e => e.extendedProps.placeholder === ph);
    phEvts.forEach(e => {
      const s = e.start < rStart ? rStart : e.start;
      const eEnd = e.end || addDaysDate(e.start, 1);
      const en = eEnd > rEnd ? rEnd : eEnd;
      occupiedDays += Math.max(0, daysDiff(s, en));
    });
  });
  const occRate = totalSlotDays > 0 ? (occupiedDays / totalSlotDays * 100).toFixed(1) : '0.0';

  const cards = [
    { l:'Total Slots',      v: totalSlots,    c:'#6c7aff', s: 'MAIN BANNER' },
    { l:'Active Campaigns', v: activeCamps,    c:'#a855f7', s: 'Unique in view' },
    { l:'Running Now',      v: runningNow,     c:'#22c55e', s: 'Currently live' },
    { l:'Scheduled',        v: scheduledCnt,   c:'#3b82f6', s: 'Upcoming' },
    { l:'Occupancy Rate',   v: occRate + '%',  c:'#f97316', s: `${occupiedDays} / ${totalSlotDays} slot-days` },
  ];

  document.getElementById('summaryBar').innerHTML = cards.map(c => `
    <div class="summary-card">
      <div class="sm-accent" style="background:${c.c};"></div>
      <div class="sm-label">${c.l}</div>
      <div class="sm-value" style="color:${c.c};">${c.v}</div>
      <div class="sm-sub">${c.s}</div>
    </div>`).join('');
}
</script>
