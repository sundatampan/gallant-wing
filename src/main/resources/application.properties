spring.application.name=balcony-grande-api
# application.properties
logging.level.org.springframework.boot.context.properties=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
# Jackson Configuration
spring.jackson.deserialization.read-unknown-enum-values-as-null=true
spring.jackson.deserialization.fail-on-ignored-properties=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.fail-on-empty-beans=false
# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/balconygrande
spring.datasource.username=balcony
spring.datasource.password=balcony
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Optional: set timezone if your app relies on it
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Optional: Hibernate dialect (Hibernate can auto-detect)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Connection pool (HikariCP - the default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# springdoc ui settings
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
# Optional: show operationIds, tags sorting, etc.
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
